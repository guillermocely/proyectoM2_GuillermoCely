openapi: 3.0.0
info:
  title: MiniBlog API
  description: API REST para gestionar autores y publicaciones
  version: 1.0.0
  contact:
    name: Proyecto Integrador M2

servers:
  - url: http://localhost:3000
    description: Servidor local de desarrollo

paths:
  /authors:
    get:
      summary: Listar todos los authors
      tags:
        - Authors
      responses:
        '200':
          description: Lista de authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'
    post:
      summary: Crear un nuevo author
      tags:
        - Authors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
      responses:
        '201':
          description: Author creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /authors/{id}:
    get:
      summary: Obtener un author por ID
      tags:
        - Authors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Author encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Author no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Actualizar un author
      tags:
        - Authors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
      responses:
        '200':
          description: Author actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Author no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Eliminar un author
      tags:
        - Authors
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Author eliminado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  author:
                    $ref: '#/components/schemas/Author'
        '404':
          description: Author no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts:
    get:
      summary: Listar todos los posts
      tags:
        - Posts
      responses:
        '200':
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
    post:
      summary: Crear un nuevo post
      tags:
        - Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '201':
          description: Post creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts/{id}:
    get:
      summary: Obtener un post por ID
      tags:
        - Posts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Actualizar un post
      tags:
        - Posts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '200':
          description: Post actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Eliminar un post
      tags:
        - Posts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Post eliminado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  post:
                    $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts/author/{authorId}:
    get:
      summary: Obtener posts por author
      tags:
        - Posts
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de posts del author
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'

  /api/test-db:
    get:
      summary: Probar conexión a la base de datos
      tags:
        - Utilidades
      responses:
        '200':
          description: Conexión exitosa
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  time:
                    type: string
        '500':
          description: Error de conexión
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          maxLength: 100
          example: "Ana García"
        email:
          type: string
          format: email
          maxLength: 150
          example: "ana@example.com"
        bio:
          type: string
          example: "Desarrolladora full-stack"
        created_at:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"

    AuthorInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          maxLength: 100
          example: "Ana García"
        email:
          type: string
          format: email
          maxLength: 150
          example: "ana@example.com"
        bio:
          type: string
          example: "Desarrolladora full-stack"

    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          maxLength: 200
          example: "Introducción a Node.js"
        content:
          type: string
          example: "Node.js es un runtime de JavaScript..."
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        author_name:
          type: string
          example: "Ana García"
        author_email:
          type: string
          format: email
          example: "ana@example.com"

    PostInput:
      type: object
      required:
        - title
        - content
        - author_id
      properties:
        title:
          type: string
          maxLength: 200
          example: "Introducción a Node.js"
        content:
          type: string
          example: "Node.js es un runtime de JavaScript..."
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: true

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Error message"
